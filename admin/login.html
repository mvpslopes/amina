<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ÂMINA — Acesso interno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="/admin/css/admin.css?v=16" />
</head>
<body class="login-page">
  <div class="login-layout">
    <div class="login-card">
      <div class="login-brand">
        <img src="/assets/images/logo-vinho.png" alt="ÂMINA" class="login-brand__logo" width="200" height="48" />
        <h1>Painel interno</h1>
        <p>Entre com suas credenciais</p>
      </div>
      <form id="loginForm" class="login-form">
        <label>
          <span>Usuário</span>
          <input type="text" name="username" autocomplete="username" required />
        </label>
        <label>
          <span>Senha</span>
          <input type="password" name="password" autocomplete="current-password" required />
        </label>
        <p class="login-error" id="loginError" hidden></p>
        <button type="submit" class="btn btn--primary btn--block">Entrar</button>
      </form>
      <a class="login-back" href="/">← Voltar ao site</a>
    </div>

    <section class="analytics-card" id="analyticsCard" hidden>
      <div class="analytics-card__head">
        <h2><i class="fa-solid fa-chart-line" aria-hidden="true"></i> Analytics do site</h2>
        <p>Visao rapida de acessos e comportamento.</p>
      </div>
      <iframe
        id="analyticsFrame"
        class="analytics-card__frame"
        title="Dashboard de Analytics"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    </section>

    <section class="analytics-card analytics-card--hint" id="analyticsHint" hidden>
      <div class="analytics-card__head">
        <h2><i class="fa-solid fa-circle-info" aria-hidden="true"></i> Analytics ainda nao configurado</h2>
      </div>
      <p class="analytics-card__text">
        Defina <code>window.AMINA_ANALYTICS_DASHBOARD_URL</code> em
        <code>/admin/js/config.js</code> para mostrar o painel aqui.
      </p>
    </section>
  </div>
  <script src="/admin/js/config.js"></script>
  <script src="/js/analytics.js?v=1"></script>
  <script src="/admin/js/login.js?v=2"></script>
</body>
</html>
